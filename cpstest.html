<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPS Test</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <h1>Clicks Per Second Test</h1>
  <div class="sidebar">
    <h2>Games</h2>
    <button onclick="location.href='cpstest.html'">CPS Test</button>
    <button onclick="location.href='reactiontest.html'">Reaction Time</button>
    <button onclick="location.href='navitest.html'">Navi Test</button>
    <button onclick="location.href='memotest.html'">Memory Test</button>
    <button onclick="location.href='aimtest.html'">Tracking Test</button>
    <button onclick="location.href='scrolltest.html'">Scroll Test</button>
  </div>
  <div class="container">

    <div class="stats">
      <div class="stat">
        <span class="stat-label"><strong>Time Left</strong></span>
        <span class="stat-value" id="time">5.0s</span>
      </div>
      <div class="stat">
        <span class="stat-label"><strong>Clicks</strong></span>
        <span class="stat-value" id="clicks">0</span>
      </div>
      <div class="stat">
        <span class="stat-label"><strong>CPS</strong></span>
        <span class="stat-value" id="cps">0.00</span>
      </div>
    </div>

    <button class="click-area" id="clickArea">Click here to start</button>

    <div class="controls">
      <select id="durationSelect" aria-label="Select test duration">
        <option value="1">1 second</option>
        <option value="5" selected>5 seconds</option>
        <option value="10">10 seconds</option>
        <option value="15">15 seconds</option>
      </select>
      <button class="control-btn" id="resetBtn">Reset</button>
    </div>

    <p class="hint">The timer starts on your first click.</p>
  </div>
  <script src="js/cpstest.js"></script>
  <footer>
  <p>Created by AB</p>
</footer>
</body>
</html>
