<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracking Test</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <h1>Tracking Test</h1>
  <div class="sidebar">
    <h2>Games</h2>
    <button onclick="location.href='cpstest.html'">CPS Test</button>
    <button onclick="location.href='reactiontest.html'">Reaction Time</button>
    <button onclick="location.href='navitest.html'">Navi Test</button>
    <button onclick="location.href='memotest.html'">Memory Test</button>
    <button onclick="location.href='aimtest.html'">Tracking Test</button>
    <button onclick="location.href='scrolltest.html'">Scroll Test</button>
  </div>
<div class="container">

  <p class="subtitle">Keep your cursor on the red ball as it gets faster.</p>

  <div class="stats">
    <div class="stat">
      <span class="stat-label">Status</span>
      <span class="stat-value" id="status">Ready</span>
    </div>
    <div class="stat">
      <span class="stat-label">Time</span>
      <span class="stat-value" id="time">0.00s</span>
    </div>
    <div class="stat">
      <span class="stat-label">Best</span>
      <span class="stat-value" id="best">--</span>
    </div>
  </div>

  <canvas id="gameCanvas" class="click-area" width="480" height="320"></canvas>

  <div class="controls">
    <button class="control-btn" id="resetBtn">Restart</button>
  </div>

  <p class="hint">Click the ball to start. If your cursor leaves the ball, you lose.</p>
</div>
<script src="js/aimtest.js"></script>
<footer>
  <p>Created by AB</p>
</footer>
</body>
</html>
