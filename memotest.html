<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Game</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<h1>Memory Test</h1>
<div class="sidebar">
  <h2>Games</h2>

  <button onclick="location.href='cpstest.html'">CPS Test</button>
  <button onclick="location.href='reactiontest.html'">Reaction Time</button>
  <button onclick="location.href='navitest.html'">Navi Test</button>
  <button onclick="location.href='memotest.html'">Memory Test</button>
  <button onclick="location.href='aimtest.html'">Tracking Test</button>
  <button onclick="location.href='scrolltest.html'">Scroll Test</button>
</div>
<div class="container">

  <p class="subtitle">Memorize the pattern and repeat it.</p>

  <div class="stats">
    <div class="stat">
      <span class="stat-label">Status</span>
      <span class="stat-value" id="status">Ready</span>
    </div>
    <div class="stat">
      <span class="stat-label">Level</span>
      <span class="stat-value" id="score">1</span>
    </div>
    <div class="stat">
      <span class="stat-label">Best</span>
      <span class="stat-value" id="best">0</span>
    </div>
  </div>

  <div id="memoryGrid"></div>

  <div class="controls">
    <button class="control-btn" id="resetBtn">Restart</button>
  </div>

  <p class="hint">Watch the pattern, then repeat it in order.</p>
</div>

<script src="/js/memotest.js"></script>
<footer>
  <p>Created by AB</p>
</footer>
</body>
</html>
