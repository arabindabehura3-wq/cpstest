<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navigation Test</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<h1>Navigation Test</h1>
<div class="sidebar">
  <h2>Games</h2>
  <button onclick="location.href='cpstest.html'">CPS Test</button>
  <button onclick="location.href='reactiontest.html'">Reaction Time</button>
  <button onclick="location.href='navitest.html'">Navi Test</button>
  <button onclick="location.href='memotest.html'">Memory Test</button>
  <button onclick="location.href='aimtest.html'">Tracking Test</button>
  <button onclick="location.href='scrolltest.html'">Scroll Test</button>
</div>
<div class="container">
  <p class="subtitle">Move your mouse from START to FINISH without touching the walls.</p>

  <div class="stats">
    <div class="stat">
      <span class="stat-label">Status</span>
      <span class="stat-value" id="status">Ready</span>
    </div>
    <div class="stat">
      <span class="stat-label">Time</span>
      <span class="stat-value" id="time">0.00s</span>
    </div>
    <div class="stat">
      <span class="stat-label">Best</span>
      <span class="stat-value" id="best">--</span>
    </div>
  </div>

  <canvas id="mazeCanvas" class="click-area" width="480" height="300"></canvas>

  <div class="controls">
    <button class="control-btn" id="resetBtn">New Maze</button>
</div>

  <p class="hint">Enter from the green START square and reach the yellow FINISH square.</p>
</div>
<script src="js/navitest.js"></script>
<footer>
  <p>Created by AB</p>
</footer>
</body>
</html>
